<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统 - 农产品良种智能客服</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --sidebar-width: 240px;
            --primary-color: #2e7d32;
            --secondary-color: #1b5e20;
            --bg-color: #f4f7f6;
            --text-main: #333;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', "Microsoft YaHei", sans-serif; }
        body { display: flex; background-color: var(--bg-color); height: 100vh; color: var(--text-main); }

        /* --- 侧边栏 --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--secondary-color);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .sidebar-header { text-align: center; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h3 { letter-spacing: 2px; }
        .sidebar-menu { flex: 1; margin-top: 20px; }
        .menu-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.8);
        }
        .menu-item:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background-color: var(--primary-color); color: white; font-weight: bold; border-left: 4px solid #a5d6a7; }

        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { color: #ffab91; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: bold; transition: 0.3s; }
        .logout-btn:hover { color: #ff8a65; transform: translateX(5px); }

        /* --- 主内容区 --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .admin-info { display: flex; align-items: center; gap: 10px; color: #666; }
        .admin-info strong { color: var(--primary-color); }

        .content-body { flex: 1; padding: 30px; overflow-y: auto; }
        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 数据大屏卡片 --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .chart-card { background: white; padding: 25px; border-radius: 15px; box-shadow: var(--card-shadow); height: 450px; }

        /* --- 图谱录入表单 --- */
        .form-card { background: white; padding: 35px; border-radius: 15px; max-width: 700px; margin: 0 auto; box-shadow: var(--card-shadow); }
        .form-card h3 { color: var(--primary-color); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 0.95rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; font-size: 1rem;
        }
        .form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1); }

        .submit-btn {
            background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px;
            cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: var(--secondary-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* 问答日志样式 */
        .log-table-container { background: white; border-radius: 15px; padding: 25px; box-shadow: var(--card-shadow); }
        .empty-tip { text-align: center; color: #999; padding: 50px 0; }

        /* 导出按钮特定样式 */
        .export-btn {
            background-color: #f57c00;
            margin-bottom: 20px;
        }
        .export-btn:hover {
            background-color: #e65100;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-leaf"></i> 农博后台</h3>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-page="dashboard" onclick="showPage('dashboard')">
                <i class="fas fa-chart-line"></i> 数据大屏
            </div>
            <div class="menu-item" data-page="kg-manage" onclick="showPage('kg-manage')">
                <i class="fas fa-project-diagram"></i> 图谱管理
            </div>
            <div class="menu-item" data-page="logs" onclick="showPage('logs')">
                <i class="fas fa-history"></i> 问答日志
            </div>
        </div>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 退出系统</a>
        </div>
    </div>

    <div class="main-content">
        <header>
            <h2 id="pageTitle">数据大屏</h2>
            <div class="admin-info">
                <i class="fas fa-user-shield"></i>
                当前管理员: <strong id="adminName">Admin</strong>
            </div>
        </header>

        <div class="content-body">
            <section id="dashboard" class="page-section active">
                <div class="stats-grid">
                    <div class="chart-card" id="cropChart"></div>
                    <div class="chart-card" id="locationChart"></div>
                </div>
            </section>

            <section id="kg-manage" class="page-section">
                <div class="form-card">
                    <h3><i class="fas fa-plus-circle"></i> 录入农产品良种数据</h3>
                    <div class="form-group">
                        <label>作物类别</label>
                        <input type="text" id="kg-crop" placeholder="例如：玉米、水稻">
                    </div>
                    <div class="form-group">
                        <label>品种名称</label>
                        <input type="text" id="kg-variety" placeholder="请输入具体品种名称">
                    </div>
                    <div class="form-group">
                        <label>预估亩产 (公斤)</label>
                        <input type="number" id="kg-yield" placeholder="请输入数字">
                    </div>
                    <div class="form-group">
                        <label>审定编号</label>
                        <input type="text" id="kg-approval" placeholder="如：国审玉20230001">
                    </div>
                    <div class="form-group">
                        <label>适宜地区 (支持逗号分隔)</label>
                        <input type="text" id="kg-locations" placeholder="河南、山东、河北">
                    </div>
                    <div class="form-group">
                        <label>抗性特征 (支持逗号分隔)</label>
                        <input type="text" id="kg-resistances" placeholder="抗倒伏、耐高温、抗大斑病">
                    </div>
                    <button class="submit-btn" id="kg-submit-btn" onclick="submitKG()">提交至知识图谱</button>
                </div>
            </section>

            <section id="logs" class="page-section">
                <div class="log-table-container">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>问答日志概览</h3>
                        <button class="submit-btn export-btn" style="width: auto; padding: 10px 20px;" onclick="exportAdminLogs()">
                            <i class="fas fa-file-export"></i> 导出全库报告 (CSV)
                        </button>
                    </div>

                    <div class="empty-tip">
                        <i class="fas fa-database" style="font-size: 3rem; display: block; margin-bottom: 15px;"></i>
                        <p>问答日志已同步至 MySQL 数据库 `chat_logs` 表。</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">您可以点击上方按钮导出完整数据，或在数据库管理工具中查看。</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 全局图表实例，用于 Resize
        let myCropChart = null;
        let myLocChart = null;

        // 页面切换逻辑
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.querySelector(`[data-page="${pageId}"]`).classList.add('active');

            const pageNames = { 'dashboard': '数据大屏', 'kg-manage': '图谱管理', 'logs': '问答日志' };
            document.getElementById('pageTitle').innerText = pageNames[pageId];

            if(pageId === 'dashboard') {
                loadStats();
            }
        }

        // --- 模块 A: 加载 ECharts 数据 ---
        function loadStats() {
            const cropDom = document.getElementById('cropChart');
            const locDom = document.getElementById('locationChart');

            if (!myCropChart) myCropChart = echarts.init(cropDom);
            if (!myLocChart) myLocChart = echarts.init(locDom);

            myCropChart.showLoading();
            myLocChart.showLoading();

            fetch('/api/admin/stats')
                .then(res => {
                    if (res.status === 403) {
                        alert("会话已失效，请重新登录");
                        window.location.href = '/login';
                        return;
                    }
                    return res.json();
                })
                .then(data => {
                    myCropChart.hideLoading();
                    myLocChart.hideLoading();

                    myCropChart.setOption({
                        title: { text: '热门咨询作物排行', left: 'center', textStyle: { color: '#2e7d32' } },
                        tooltip: { trigger: 'axis' },
                        grid: { left: '10%', right: '10%', bottom: '15%' },
                        xAxis: {
                            data: data.crops.map(i => i.name),
                            axisLabel: { interval: 0, rotate: 30 }
                        },
                        yAxis: { name: '咨询次数', minInterval: 1 },
                        series: [{
                            name: '点击量',
                            type: 'bar',
                            data: data.crops.map(i => i.value),
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#83bff6' },
                                    { offset: 0.5, color: '#188df0' },
                                    { offset: 1, color: '#188df0' }
                                ])
                            }
                        }]
                    });

                    myLocChart.setOption({
                        title: { text: '咨询用户地区分布', left: 'center', textStyle: { color: '#2e7d32' } },
                        tooltip: { trigger: 'item', formatter: '{a} <br/>{b} : {c} ({d}%)' },
                        legend: { bottom: '5%', left: 'center' },
                        series: [{
                            name: '地区分布',
                            type: 'pie',
                            radius: ['40%', '70%'],
                            data: data.locations,
                            itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                        }]
                    });
                })
                .catch(err => {
                    myCropChart.hideLoading();
                    myLocChart.hideLoading();
                });
        }

        // --- 模块 B: 提交图谱数据 ---
        function submitKG() {
            const btn = document.getElementById('kg-submit-btn');
            const crop = document.getElementById('kg-crop').value.trim();
            const variety = document.getElementById('kg-variety').value.trim();

            if(!crop || !variety) {
                alert("作物类别和品种名称为必填项");
                return;
            }

            btn.disabled = true;
            btn.innerText = "正在提交...";

            const splitAndTrim = (str) => str ? str.split(/[，,]/).map(i => i.trim()).filter(i => i) : [];

            const payload = {
                crop: crop,
                variety: variety,
                yield: document.getElementById('kg-yield').value,
                approval: document.getElementById('kg-approval').value.trim(),
                locations: splitAndTrim(document.getElementById('kg-locations').value),
                resistances: splitAndTrim(document.getElementById('kg-resistances').value)
            };

            fetch('/api/admin/kg/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if(data.code === 200) {
                    document.querySelectorAll('.form-group input').forEach(i => i.value = '');
                    showPage('dashboard');
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "提交至知识图谱";
            });
        }

        // --- 模块 C: 【新增】导出日志功能 ---
        function exportAdminLogs() {
            // 直接通过 URL 触发后端下载
            window.location.href = '/api/admin/export/logs';
        }

        window.onresize = function() {
            if (myCropChart) myCropChart.resize();
            if (myLocChart) myLocChart.resize();
        };

        window.onload = loadStats;
    </script>
</body>
</html>
